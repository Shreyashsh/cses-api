name: Notify Failures

on:
  workflow_run:
    workflows: ['Tests', 'Lint']
    branches: ['master', 'main']
    types:
      - completed

permissions:
  issues: write

jobs:
  notify-on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'push' }}
    steps:
      - name: Create issue on workflow failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowName = '${{ github.event.workflow_run.name }}';
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            const commitSha = '${{ github.event.workflow_run.head_sha }}'.substring(0, 7);
            const branch = '${{ github.event.workflow_run.head_branch }}';
            const actor = '${{ github.actor }}';
            
            const title = `🚨 ${workflowName} Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## CI Workflow Failure

            **Workflow:** ${workflowName}
            **Branch:** ${branch}
            **Commit:** ${commitSha}
            **Triggered by:** ${actor}
            **Run URL:** ${runUrl}

            ---
            *This issue was automatically created by GitHub Actions.*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'ci/cd']
            });
            
            console.log('Issue created for workflow failure');
