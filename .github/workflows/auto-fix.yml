name: Auto Fix Issues

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-fix:
    if: contains(github.event.label.name, 'auto-fix')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const issueTitle = context.payload.issue.title;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🤖 **Auto-Fix Triggered**
              
              I've detected the \`auto-fix\` label. To enable automatic AI-powered fixes:
              
              1. **Warp Oz Agent** (recommended): Add `WARP_API_KEY` to repository secrets and install the Oz action
              2. **GitHub Copilot**: Mention \`@copilot fix this\` in a comment (requires Copilot subscription)
              
              For now, a maintainer will need to manually fix this issue.
              
              **Issue:** ${issueTitle}
              `
            });
