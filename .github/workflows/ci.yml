name: CI

on:
  push:
    branches: ['master', 'main']
  pull_request:
    branches: ['master', 'main']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  code-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          pip install flake8 pylint black isort

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check code style with black
        run: |
          black --check .

      - name: Check imports with isort
        run: |
          isort --check-only .

      - name: Run pylint
        run: |
          pylint $(git ls-files '*.py') --exit-zero || true
        continue-on-error: true

      # AI-powered review with Reviewdog (free, no API key)
      - name: Run Reviewdog on flake8 output
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-flake8@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_on_error: false

  coderabbit:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: CodeRabbit AI Review
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: [test, code-review, coderabbit]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create issue on workflow failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowName = 'CI';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitSha = context.sha.substring(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            
            const title = `🚨 CI Workflow Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## CI Workflow Failure

            **Workflow:** ${workflowName}
            **Branch:** ${branch}
            **Commit:** ${commitSha}
            **Triggered by:** ${{ github.actor }}
            **Run URL:** ${runUrl}

            ### Failed Jobs

            ${{ toJSON(needs) }}

            ---
            *This issue was automatically created by GitHub Actions.*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'ci/cd']
            });
            
            console.log('Issue created for workflow failure');
